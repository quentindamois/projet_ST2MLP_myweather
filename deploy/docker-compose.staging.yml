services:
  backend:
      image: backend:staging
      build: 
        context: ../backend
        args:
          MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
          MLFLOW_TRACKING_TOKEN: ${MLFLOW_TRACKING_TOKEN}
      ports:
        - "8001:8000"
      environment:
        MODEL_NAME: weather-model
        MODEL_ALIAS: Staging
  frontend:
      image: frontend:staging
      build:
        context: ../frontend
        args:
          VITE_BACKEND_URL: "http://localhost:8001"
      environment:
        FLASK_BACKEND_NAME: backend
      ports:
       - "8080:80"
  