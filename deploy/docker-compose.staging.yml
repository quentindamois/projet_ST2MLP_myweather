services:
  backend:
      image: backend:staging
      build: ../backend
      ports:
        - "8001:8000"
      environment:
        MODEL_NAME: weather-model
        MODEL_ALIAS: Staging
        MLFLOW_TRACKING_URI: ${DAGSHUB_MLFLOW_TRACKING_URI}
        MLFLOW_TRACKING_TOKEN: ${DAGSHUB_TOKEN}
  frontend:
      image: frontend:staging
      build:
        context: ../frontend
        args:
          VITE_BACKEND_URL: "http://localhost:8001"
      environment:
        FLASK_BACKEND_NAME: backend
      ports:
       - "8080:80"
  