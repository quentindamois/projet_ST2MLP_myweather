services:
  backend:
      image: backend:production
      build: ../backend
      ports:
        - "8001:8000"
      environment:
        MODEL_NAME: weather-model
        MODEL_ALIAS: Production
        MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
        MLFLOW_TRACKING_TOKEN: ${MLFLOW_TRACKING_TOKEN}
  frontend:
      image: frontend:production
      build:
        context: ../frontend
        args:
          # inside the same docker network the service name works correctly
          VITE_BACKEND_URL: ${BACKEND_URL}
      environment:
        FLASK_BACKEND_NAME: backend
      ports:
       - "8080:80"
  