name: Integrating dev changes to staging environment

on:
  workflow_dispatch:
  pull_request:
    branches:
      - staging

jobs:
  unit_and_integration_step:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
      - name: Run backend unit tests
        run: |
          pytest
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend end-to-end tests
        working-directory: frontend
        run: |
          npm run build
          npx playwright install --with-deps
          npx playwright test

  build_docker_image:
    needs: unit_and_integration_step
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build + push image (Staging)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker compose -f ./deploy/docker-compose.staging.yml build --no-cache
          docker tag backend:staging ${DOCKERHUB_USERNAME}/st2mlp_myweather-backend:staging
          docker tag frontend:staging ${DOCKERHUB_USERNAME}/st2mlp_myweather-frontend:staging
          docker push ${DOCKERHUB_USERNAME}/st2mlp_myweather-backend:staging
          docker push ${DOCKERHUB_USERNAME}/st2mlp_myweather-frontend:staging
  promote_to_staging:
    needs: build_docker_image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install ML deps
        run: |
          pip install -r ./requirements.txt 
      - name: give alias Staging 
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.DAGSHUB_MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MODEL_NAME: weather-model
          ALIAS_MODEL: dev
          NEW_ALIAS_MODEL: Staging
        run: |
          python training/assign_tag.py